name: Pi Continuous Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  setup:
    name: Setup Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd pi-package
          npm ci

      - name: Run setup script
        run: |
          chmod +x scripts/setup.sh
          ./scripts/setup.sh

  validate:
    name: Validate Environment
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - name: Validate configuration
        run: |
          chmod +x scripts/validate.sh
          ./scripts/validate.sh

  code-review:
    name: Code Review (Pi)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Run Pi Code Reviewer
        run: |
          npx pi prompt run pi-package/prompts/review.md --skill pi-package/skills/code-reviewer/SKILL.md

  tests:
    name: Run Tests (Pi)
    runs-on: ubuntu-latest
    needs: code-review
    steps:
      - uses: actions/checkout@v4
      - name: Execute Pi Test Prompt
        run: |
          npx pi prompt run pi-package/prompts/test.md

  security:
    name: Security Check (Pi)
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - name: Run Security Analysis
        run: |
          npx pi prompt run pi-package/prompts/security.md

  deploy-check:
    name: Deployment Check & Report
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - name: Run Deploy Check
        run: |
          npx pi prompt run pi-package/prompts/deploy-check.md

      - name: Generate CI Report
        run: |
          npx ts-node pi-package/extensions/ci-reporter.ts

      - name: Upload CI Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-report
          path: ci-report/*
          retention-days: 7

  frontend-deploy:
    name: Frontend Deploy to Vercel
    runs-on: ubuntu-latest
    needs: deploy-check
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Vercel Deployment
        uses: amondnet/vercel-action@v27
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend

  backend-deploy:
    name: Backend Deploy to Render
    runs-on: ubuntu-latest
    needs: frontend-deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -X POST https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys \
            -H 'accept: application/json' \
            -H "authorization: Bearer $RENDER_API_KEY"